<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Resolver - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: rgba(30, 41, 59, 0.7);
            --text-dark: #f8fafc;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            box-sizing: border-box;
        }

        .navbar b {
            font-size: 1.25rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            margin-left: 1.5rem;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            opacity: 0.8;
        }

        .nav-links a:hover {
            color: #fff;
            opacity: 1;
        }

        .profile-container {
            margin-top: 5rem;
            width: 100%;
            max-width: 480px;
            padding: 2.5rem;
            background: var(--card-dark);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .avatar-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem auto;
            border-radius: 50%;
            padding: 4px;
            background: var(--gradient);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .role-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 0.25rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .info-group {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s, background 0.2s;
        }

        .info-group:hover {
            transform: translateX(5px);
            background: rgba(15, 23, 42, 0.8);
        }

        .info-icon {
            font-size: 1.25rem;
            margin-right: 1rem;
            color: #94a3b8;
            background: rgba(255,255,255,0.05);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-content p {
            margin: 0;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-content h3 {
            margin: 0.25rem 0 0 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: 12px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--gradient);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            top: -100px;
            right: -100px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div><b>🤖 Bug Resolver AI</b></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/profile" style="color: #fff; opacity: 1;">Profile</a>
            <a href="/settings">Settings</a>
            <a href="/developer">Developer</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="blob"></div>
        <div class="avatar-wrapper">
            <div class="avatar">👨‍💻</div>
        </div>
        
        <div class="profile-header">
            <h1 id="profileName">Anmol Shukla</h1>
            <span class="role-badge">Lead Admin</span>
        </div>

        <div class="info-group">
            <div class="info-icon">🏢</div>
            <div class="info-content">
                <p>Project</p>
                <h3>Bug Resolver AI Agent</h3>
            </div>
        </div>

        <div class="info-group">
            <div class="info-icon">📧</div>
            <div class="info-content">
                <p>Email</p>
                <h3 id="profileEmail">admin@bugresolver.ai</h3>
            </div>
        </div>
        
        <div class="info-group">
            <div class="info-icon">⭐</div>
            <div class="info-content">
                <p>Status</p>
                <h3>Active</h3>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/settings" class="btn btn-secondary">Edit Profile</a>
            <a href="/" class="btn btn-primary">Back to Action</a>
        </div>
    </div>

    <script>
        const SETTINGS_KEY = 'bugResolverUiSettings';

        function getSavedSettings() {
            const saved = localStorage.getItem(SETTINGS_KEY);
            if (!saved) return null;
            try {
                return JSON.parse(saved);
            } catch (err) {
                console.warn('Could not parse saved settings', err);
                return null;
            }
        }

        function applyProfileSettings(settings) {
            if (!settings) return;

            if (settings.displayName) {
                const nameEl = document.getElementById('profileName');
                if (nameEl) nameEl.textContent = settings.displayName;
            }

            if (settings.email) {
                const emailEl = document.getElementById('profileEmail');
                if (emailEl) emailEl.textContent = settings.email;
            }

            if (typeof settings.darkMode === 'boolean') {
                const root = document.documentElement.style;
                if (settings.darkMode) {
                    root.setProperty('--bg-dark', '#0f172a');
                    root.setProperty('--card-dark', 'rgba(30, 41, 59, 0.7)');
                    root.setProperty('--text-dark', '#f8fafc');
                } else {
                    root.setProperty('--bg-dark', '#f8fafc');
                    root.setProperty('--card-dark', 'rgba(255, 255, 255, 0.9)');
                    root.setProperty('--text-dark', '#1f2937');
                }
            }

            if (settings.animationEffects === false) {
                document.body.classList.add('no-animations');
            } else {
                document.body.classList.remove('no-animations');
            }

            if (settings.accentColor) {
                const accentMap = {
                    violet: {gradient: 'linear-gradient(135deg, #6366f1 0%, #a855f7 100%)'},
                    blue: {gradient: 'linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%)'},
                    emerald: {gradient: 'linear-gradient(135deg, #059669 0%, #10b981 100%)'},
                    rose: {gradient: 'linear-gradient(135deg, #fb7185 0%, #f43f5e 100%)'}
                };
                const tag = accentMap[settings.accentColor] || accentMap.violet;
                document.documentElement.style.setProperty('--gradient', tag.gradient);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const settings = getSavedSettings();
            applyProfileSettings(settings);
        });
    </script>
</body>
</html>
